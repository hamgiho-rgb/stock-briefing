const b2u=function(b){return Uint8Array.from(atob(b),function(c){return c.charCodeAt(0)})};
async function unlock(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b2u(SALT),iterations:ITER,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2u(IV)},key,b2u(CT));
  return new TextDecoder().decode(pt);
}
async function tryPw(pw,silent){
  try{
    const html=await unlock(pw);
    try{localStorage.setItem("sb_pw",pw)}catch(e){}
    document.open();document.write(html);document.close();
  }catch(e){
    if(!silent){document.getElementById("err").textContent="비밀번호가 틀렸어요";
      const i=document.getElementById("pw");i.value="";i.focus();}
  }
}
document.getElementById("go").addEventListener("click",function(){tryPw(document.getElementById("pw").value,false)});
document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")tryPw(e.target.value,false)});
window.addEventListener("load",function(){
  var saved=null;try{saved=localStorage.getItem("sb_pw")}catch(e){}
  if(saved)tryPw(saved,true);else document.getElementById("pw").focus();
});
</script>
